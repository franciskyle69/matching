<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Capstone{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: #000;
      color: #fff;
      line-height: 1.6;
    }
    .auth-page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/static/assets/auth-background.png?v=2") center / cover no-repeat;
      z-index: 0;
      pointer-events: none;
    }
    .auth-page-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
      pointer-events: none;
    }
    .auth-card-standalone {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      padding: 32px;
    }
    .auth-card-standalone h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .auth-card-standalone .subtitle {
      margin: 0 0 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }
    .auth-card-standalone label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 8px;
    }
    .auth-card-standalone input[type="text"],
    .auth-card-standalone input[type="email"],
    .auth-card-standalone input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(15, 23, 42, 0.4);
      color: #fff;
      margin-bottom: 16px;
    }
    .auth-card-standalone input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    .auth-card-standalone input:focus {
      outline: none;
      border-color: rgba(79, 70, 229, 0.6);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }
    .auth-card-standalone .btn-primary {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #352c90 0%, #22177A 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    .auth-card-standalone .btn-primary:hover {
      background: linear-gradient(135deg, #22177A 0%, #120c55 100%);
    }
    .auth-card-standalone .btn-primary:disabled {
      background: rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.55);
      cursor: not-allowed;
      box-shadow: none;
    }
    .auth-card-standalone .auth-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
    }
    .auth-card-standalone .auth-link a {
      color: rgba(182, 171, 255, 1);
      text-decoration: none;
    }
    .auth-card-standalone .auth-link a:hover {
      text-decoration: underline;
    }
    .auth-card-standalone .form-group {
      margin-bottom: 4px;
    }
    .auth-card-standalone .errornote {
      font-size: 13px;
      color: #fca5a5;
      background: rgba(220, 38, 38, 0.2);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .auth-card-standalone .password-strength {
      margin-top: 8px;
      padding: 12px 14px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 23, 42, 0.42);
    }
    .auth-card-standalone .password-strength-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .auth-card-standalone .password-strength-fill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f59e0b 0%, #f97316 100%);
      transition: width .2s ease;
    }
    .auth-card-standalone .password-strength-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 6px;
      font-size: 13px;
    }
    .auth-card-standalone .password-strength-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #fca5a5;
      transition: color .15s ease;
    }
    .auth-card-standalone .password-strength-item::before {
      content: "•";
      line-height: 1;
      font-size: 16px;
      margin-top: -1px;
      color: currentColor;
    }
    .auth-card-standalone .password-strength-item.is-valid {
      color: #86efac;
    }
    .auth-card-standalone .password-strength-item.is-invalid {
      color: #fca5a5;
    }
    .auth-card-standalone .success-note {
      font-size: 13px;
      color: #86efac;
      background: rgba(34, 197, 94, 0.2);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .auth-card-standalone ul.errorlist { margin: 0 0 12px; padding-left: 1.25rem; font-size: 13px; color: #fca5a5; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <div class="auth-page-wrap">
    <div class="auth-card-standalone">
      {% if messages %}
        {% for message in messages %}
          <div class="{% if message.tags == 'error' or message.tags == 'warning' %}errornote{% else %}success-note{% endif %}" style="margin-bottom:12px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>
  <script>
    (function() {
      function evaluatePassword(value) {
        return {
          length: value.length >= 8,
          number: /[0-9]/.test(value),
          special: /[^A-Za-z0-9]/.test(value),
        };
      }

      function updateWidget(widget) {
        const form = widget.closest("form");
        if (!form) return;

        const passwordInput = form.querySelector('input[type="password"]');
        const submitButton = form.querySelector('button[type="submit"]');
        if (!passwordInput) return;

        const value = passwordInput.value || "";
        const rules = evaluatePassword(value);
        const entries = ["length", "number", "special"];
        let passed = 0;

        entries.forEach((rule) => {
          const element = widget.querySelector(`[data-rule="${rule}"]`);
          if (!element) return;

          const isValid = !!rules[rule];
          element.classList.toggle("is-valid", isValid);
          element.classList.toggle("is-invalid", !isValid);
          passed += isValid ? 1 : 0;
        });

        const fill = widget.querySelector("[data-password-strength-fill]");
        if (fill) {
          fill.style.width = `${Math.round((passed / entries.length) * 100)}%`;
        }

        if (submitButton) {
          submitButton.disabled = passed < entries.length;
        }
      }

      function initPasswordWidgets() {
        document.querySelectorAll("[data-password-strength]").forEach((widget) => {
          const form = widget.closest("form");
          if (!form) return;

          const passwordInput = form.querySelector('input[type="password"]');
          if (!passwordInput) return;

          const refresh = () => updateWidget(widget);
          passwordInput.addEventListener("input", refresh);
          passwordInput.addEventListener("change", refresh);
          refresh();
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initPasswordWidgets);
      } else {
        initPasswordWidgets();
      }
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
