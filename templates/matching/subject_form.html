{% extends "registration/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_name">Name</label>
      <input type="text" name="name" id="id_name" value="{{ form.name.value|default:'' }}" required>
      {% if form.name.errors %}
      <p class="errornote" style="margin-top:.5rem;">{{ form.name.errors.0 }}</p>
      {% endif %}
    </div>
    <div class="form-group">
      <label for="id_description">Description</label>
      <input type="text" name="description" id="id_description" value="{{ form.description.value|default:'' }}">
    </div>
    <button type="submit" class="btn-primary">Save</button>
  </form>
</div>
{% endblock %}
