{% extends "registration/base.html" %}
{% block title %}Delete Subject{% endblock %}
{% block content %}
<div class="card">
  <h1>Delete Subject</h1>
  <p>Are you sure you want to delete <strong>{{ subject.name }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-primary">Delete</button>
    <a href="{% url 'subjects_list' %}" class="btn-primary secondary">Cancel</a>
  </form>
</div>
{% endblock %}
